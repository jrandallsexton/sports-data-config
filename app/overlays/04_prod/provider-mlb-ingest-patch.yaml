apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-baseball-mlb-ingest
  namespace: default
spec:
  # Paused 2026-04-24: abandoning full historical MLB sourcing; focusing on
  # current-season in-season testing only. Restore to 1 when resuming ingest.
  replicas: 0
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-04-08T11:30:00Z"
    spec:
      containers:
      - name: provider-baseball-mlb-ingest
        image: sportdeets.azurecr.io/sportsdataprovider:3930
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
