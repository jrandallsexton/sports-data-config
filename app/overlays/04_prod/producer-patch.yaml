apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-football-ncaa-worker
  namespace: default
spec:
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T14:45:00Z"
    spec:
      containers:
      - name: producer-football-ncaa-worker
        image: sportdeets.azurecr.io/sportsdataproducer:4087
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
        resources:
          requests:
            memory: 1Gi
            cpu: "0.5"
          limits:
            memory: 2Gi
            cpu: "2"
