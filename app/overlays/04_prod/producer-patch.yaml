apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-football-ncaa-worker
  namespace: default
spec:
  replicas: 0
  template:
    spec:
      containers:
      - name: producer-football-ncaa-worker
        image: sportdeets.azurecr.io/sportsdataproducer:3468
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
        resources:
          requests:
            memory: 1Gi
            cpu: "0.5"
          limits:
            memory: 2Gi
            cpu: "2"
