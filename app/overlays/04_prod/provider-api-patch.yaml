apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-football-ncaa-api
  namespace: default
spec:
  replicas: 0
  template:
    spec:
      containers:
      - name: provider-football-ncaa-api
        image: sportdeets.azurecr.io/sportsdataprovider:4678
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
