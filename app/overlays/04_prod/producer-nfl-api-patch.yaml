apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-football-nfl-api
  namespace: default
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: enabled
spec:
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T14:45:00Z"
    spec:
      containers:
      - name: producer-football-nfl-api
        image: sportdeets.azurecr.io/sportsdataproducer:3720
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
