# Prod overlay for the producer-baseball-mlb-daemon Deployment.
#
# Image tag is auto-bumped by .github/workflows/deploy-services-prod-auto.yml
# in the sports-data repo (workflow includes this patch alongside the other
# producer patches; see PR #418).
#
# Replicas: 2 for in-season HA — one alone is a SPOF against planned node
# drain, OS update, OOM kill. Scale to 0 manually via Flux when out of
# season; bump back when the next sport's season starts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-baseball-mlb-daemon
  namespace: default
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: enabled
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: producer-baseball-mlb-daemon
        image: sportdeets.azurecr.io/sportsdataproducer:5577
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
