apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-football-nfl-worker
  namespace: default
spec:
  replicas: 0
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-29T15:30:00Z"
    spec:
      containers:
      - name: provider-football-nfl-worker
        image: sportdeets.azurecr.io/sportsdataprovider:3489
        env:
        - name: APPCONFIG_LABEL
          value: "Prod"
