apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-document-processing
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  document-processing.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Documents Processed by Type",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_processed_total{job=~\"$job\"}[$__rate_interval])) by (DocumentType)",
              "legendFormat": "{{DocumentType}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "documents / interval",
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "lineInterpolation": "smooth",
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": ["sum", "mean"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "sortBy": "Total",
              "sortDesc": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 }
        },
        {
          "title": "Documents Failed by Type",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_failed_total{job=~\"$job\"}[$__rate_interval])) by (DocumentType)",
              "legendFormat": "{{DocumentType}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "failures / interval",
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "lineInterpolation": "smooth",
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": ["sum"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "sortBy": "Total",
              "sortDesc": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 12 }
        },
        {
          "title": "Documents Retried (Missing Dependencies)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_retried_total{job=~\"$job\"}[$__rate_interval])) by (DocumentType)",
              "legendFormat": "{{DocumentType}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "retries / interval",
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "lineInterpolation": "smooth",
                "showPoints": "auto",
                "stacking": { "mode": "none" }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": ["sum"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "sortBy": "Total",
              "sortDesc": true
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 12 }
        },
        {
          "title": "Total Processed (period)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_processed_total{job=~\"$job\"}[$__range]))",
              "legendFormat": "Processed",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["sum"], "fields": "", "values": false }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 22 }
        },
        {
          "title": "Total Failed (period)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_failed_total{job=~\"$job\"}[$__range]))",
              "legendFormat": "Failed",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["sum"], "fields": "", "values": false }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 22 }
        },
        {
          "title": "Total Retried (period)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(increase(documents_retried_total{job=~\"$job\"}[$__range]))",
              "legendFormat": "Retried",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["sum"], "fields": "", "values": false }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 22 }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["producer", "documents"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "All",
              "value": "$__all"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(documents_processed_total, job)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "job",
            "options": [],
            "query": {
              "query": "label_values(documents_processed_total, job)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 0,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Document Processing",
      "uid": "document-processing",
      "version": 1
    }
