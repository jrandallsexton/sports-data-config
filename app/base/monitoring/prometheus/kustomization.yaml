apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - helmrelease.yaml
  - configmap.yaml
  - ingressroutes.yaml
  - pushgateway.yaml
  - dashboard-row-counts.yaml
  - dashboard-rabbitmq.yaml
  - dashboard-rabbitmq-queues.yaml
  - dashboard-historical-sourcing-sagas.yaml
  - dashboard-hangfire.yaml
  - hangfire-exporter-cronjob.yaml

patches:
- patch: |-
    - op: replace
      path: /metadata/namespace
      value: default
  target:
    kind: CronJob
    name: hangfire-metrics-exporter
- patch: |-
    - op: replace
      path: /metadata/namespace
      value: default
  target:
    kind: ConfigMap
    name: hangfire-metrics-script
