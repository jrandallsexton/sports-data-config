apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-hangfire
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  hangfire-metrics.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "$app - Queue Sizes",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "repeat": "app",
          "repeatDirection": "h",
          "maxPerRow": 3,
          "targets": [
            {
              "expr": "hangfire_queue_size{app=\"$app\"}",
              "legendFormat": "{{queue}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisPlacement": "auto",
                "fillOpacity": 80,
                "lineWidth": 1
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          }
        },
        {
          "title": "$app - Job States",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "repeat": "app",
          "repeatDirection": "h",
          "maxPerRow": 3,
          "targets": [
            {
              "expr": "hangfire_job_state_count{app=\"$app\"}",
              "legendFormat": "{{state}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["hangfire"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(hangfire_job_state_count, app)",
            "hide": 0,
            "includeAll": true,
            "label": "Application",
            "multi": true,
            "name": "app",
            "options": [],
            "query": {
              "query": "label_values(hangfire_job_state_count, app)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Hangfire Queues & Jobs",
      "uid": "hangfire-exporter-custom",
      "version": 1
    }
