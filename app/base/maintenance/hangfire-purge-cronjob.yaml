apiVersion: v1
kind: ConfigMap
metadata:
  name: hangfire-purge-script
  namespace: default
data:
  purge.sh: |
    #!/bin/sh
    set -e

    RETENTION_DAYS=${RETENTION_DAYS:-7}
    BATCH_SIZE=${BATCH_SIZE:-50000}

    echo "Hangfire succeeded job purge — retaining last ${RETENTION_DAYS} days"

    DATABASES=$(psql -t -A -q -c "SELECT datname FROM pg_database WHERE datname ILIKE '%Hangfire';")

    if [ -z "$DATABASES" ]; then
      echo "No Hangfire databases found."
      exit 0
    fi

    for DB in $DATABASES; do
      echo "=== Processing $DB ==="

      # Show current state counts
      psql -d "$DB" -c "SELECT statename, COUNT(*) AS cnt FROM hangfire.job GROUP BY statename ORDER BY cnt DESC;" 2>/dev/null || true

      # Batch delete succeeded jobs older than retention period
      TOTAL=0
      while true; do
        DELETED=$(psql -d "$DB" -t -A -q -c "
          WITH to_delete AS (
            SELECT id FROM hangfire.job
            WHERE statename = 'Succeeded'
              AND createdat < NOW() - INTERVAL '${RETENTION_DAYS} days'
            LIMIT ${BATCH_SIZE}
          ),
          removed AS (
            DELETE FROM hangfire.job
            WHERE id IN (SELECT id FROM to_delete)
            RETURNING id
          )
          SELECT COUNT(*) FROM removed;
        " 2>/dev/null)

        DELETED=$(echo "$DELETED" | tr -d '[:space:]')

        if [ -z "$DELETED" ] || [ "$DELETED" = "0" ]; then
          break
        fi

        TOTAL=$((TOTAL + DELETED))
        echo "  Deleted batch: $DELETED (total: $TOTAL)"
        sleep 1
      done

      echo "  Purged $TOTAL succeeded jobs from $DB"

      # Analyze tables so the query planner has fresh stats after purge
      if [ "$TOTAL" -gt 0 ]; then
        psql -d "$DB" -q -c "ANALYZE hangfire.job;" 2>/dev/null || true
        psql -d "$DB" -q -c "ANALYZE hangfire.state;" 2>/dev/null || true
        echo "  Analyzed tables"
      fi
    done

    echo "Done."
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hangfire-purge-succeeded
  namespace: default
spec:
  schedule: "0 4 * * 0"            # Weekly: Sunday at 4:00 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600   # Kill if running longer than 1 hour
      template:
        metadata:
          labels:
            app: hangfire-purge-succeeded
        spec:
          restartPolicy: OnFailure
          containers:
          - name: purge
            image: postgres:15-alpine
            command: ["/bin/sh", "/scripts/purge.sh"]
            env:
            - name: RETENTION_DAYS
              value: "7"
            - name: BATCH_SIZE
              value: "50000"
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: host
                  optional: true
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: port
                  optional: true
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database
                  optional: true
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
                  optional: true
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
                  optional: true
            resources:
              requests:
                memory: 64Mi
                cpu: "0.1"
              limits:
                memory: 128Mi
                cpu: "0.5"
            volumeMounts:
            - name: script-volume
              mountPath: /scripts
              readOnly: true
          volumes:
          - name: script-volume
            configMap:
              name: hangfire-purge-script
              defaultMode: 0755
