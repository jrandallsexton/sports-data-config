apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: producer-baseball-mlb-worker-scaler
  namespace: default
  annotations:
    # Toggle paused: "true" to halt scaling. paused-replicas pins the
    # target replica count while paused; KEDA treats its presence as
    # authoritative even when paused: "false", so it must be removed
    # (NOT left at "0") to resume normal scaling.
    autoscaling.keda.sh/paused: "false"
spec:
  scaleTargetRef:
    name: producer-baseball-mlb-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 6
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: postgresql
      metadata:
        query: >-
          SELECT COUNT(*)::int
          FROM hangfire.jobqueue
          WHERE fetchedat IS NULL
            AND queue = 'default'
        targetQueryValue: "30"
        activationTargetQueryValue: "1"
      authenticationRef:
        name: producer-mlb-hangfire-trigger-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: producer-mlb-hangfire-trigger-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: host
      name: producer-mlb-hangfire-pg-params
      key: host
    - parameter: port
      name: producer-mlb-hangfire-pg-params
      key: port
    - parameter: userName
      name: producer-mlb-hangfire-pg-params
      key: username
    - parameter: password
      name: producer-mlb-hangfire-pg-params
      key: password
    - parameter: dbName
      name: producer-mlb-hangfire-pg-params
      key: database
    - parameter: sslmode
      name: producer-mlb-hangfire-pg-params
      key: sslmode
