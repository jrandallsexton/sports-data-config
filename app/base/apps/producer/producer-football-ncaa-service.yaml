apiVersion: v1
kind: Service
metadata:
  name: producer-svc-football-ncaa
  namespace: default
  labels:
    app: producer-football-ncaa-api
spec:
  selector:
    app: producer-football-ncaa-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
# Headless Service for Worker pods — enables Prometheus ServiceMonitor discovery
apiVersion: v1
kind: Service
metadata:
  name: producer-football-ncaa-worker-metrics
  namespace: default
  labels:
    app: producer-football-ncaa-worker
spec:
  selector:
    app: producer-football-ncaa-worker
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: producer-svc-football-ncaa-db
  namespace: default
spec:
  clusterIP: None
  ports:
  - protocol: TCP
    name: producer-svc-db
    port: 1433
    targetPort: 1433
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: producer-svc-football-ncaa-db
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.0.3
    ports:
      - port: 1433
        name: producer-svc-db
