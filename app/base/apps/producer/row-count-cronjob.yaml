apiVersion: v1
kind: ConfigMap
metadata:
  name: row-count-script
  namespace: default
data:
  run.sh: |
    #!/bin/sh
    set -e

    echo "Starting row count collection for database: $PGDATABASE..."

    # Get the list of tables to count
    TABLES_QUERY="
      SELECT table_name
      FROM information_schema.tables
      WHERE table_schema = 'public'
        AND table_type = 'BASE TABLE'
        AND table_name NOT IN ('OutboxMessage', 'OutboxState', 'OutboxPings', 'InboxState');
    "

    TABLES=$(psql -t -A -q -c "$TABLES_QUERY")

    if [ -z "$TABLES" ]; then
      echo "No tables found or query failed."
      exit 1
    fi

    # Format metrics for Prometheus with database label
    METRICS=""
    for TABLE in $TABLES; do
      # Get the exact count for each table
      COUNT=$(psql -t -A -q -c "SELECT COUNT(*) FROM public.\"$TABLE\";")

      if [ -n "$COUNT" ]; then
        METRICS="${METRICS}sportsdata_table_row_count{table=\"${TABLE}\",database=\"${PGDATABASE}\"} ${COUNT}\n"
      fi
    done

    echo "Generated metrics:"
    printf "%b" "$METRICS"

    # Push to Pushgateway with database-specific job name
    if [ -n "$PUSHGATEWAY_URL" ]; then
      JOB_NAME="postgres_row_counts/${PGDATABASE}"
      echo "Pushing to $PUSHGATEWAY_URL (job=$JOB_NAME)..."

      if command -v curl >/dev/null 2>&1; then
        printf "%b" "$METRICS" | curl --silent --show-error --data-binary @- "${PUSHGATEWAY_URL}/metrics/job/postgres_row_counts/database/${PGDATABASE}"
      else
        echo -e "$METRICS" > /tmp/metrics.txt
        wget --post-file=/tmp/metrics.txt -qO- "${PUSHGATEWAY_URL}/metrics/job/postgres_row_counts/database/${PGDATABASE}"
      fi

      echo "Push complete."
    else
      echo "PUSHGATEWAY_URL not set, skipping push."
    fi
---
# NCAA Producer row counts
apiVersion: batch/v1
kind: CronJob
metadata:
  name: producer-ncaa-row-count-exporter
  namespace: default
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: producer-row-count-exporter
        spec:
          restartPolicy: OnFailure
          containers:
          - name: exporter
            image: postgres:15-alpine
            command: ["/bin/sh", "/scripts/run.sh"]
            env:
              - name: PUSHGATEWAY_URL
                value: "http://pushgateway.monitoring.svc.cluster.local:9091"
              - name: PGHOST
                valueFrom:
                  secretKeyRef:
                    name: postgres-credentials
                    key: host
              - name: PGPORT
                valueFrom:
                  secretKeyRef:
                    name: postgres-credentials
                    key: port
              - name: PGDATABASE
                value: "sdProducer.FootballNcaa"
              - name: PGUSER
                valueFrom:
                  secretKeyRef:
                    name: postgres-credentials
                    key: username
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-credentials
                    key: password
            volumeMounts:
            - name: script-volume
              mountPath: /scripts
              readOnly: true
          volumes:
          - name: script-volume
            configMap:
              name: row-count-script
              defaultMode: 0755
---
