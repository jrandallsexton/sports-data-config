apiVersion: v1
kind: Service
metadata:
  name: producer-svc-baseball-mlb
  namespace: default
  labels:
    app: producer-baseball-mlb-api
spec:
  selector:
    app: producer-baseball-mlb-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
# Headless Service for Worker pods — enables Prometheus ServiceMonitor discovery
apiVersion: v1
kind: Service
metadata:
  name: producer-baseball-mlb-worker-metrics
  namespace: default
  labels:
    app: producer-baseball-mlb-worker
spec:
  selector:
    app: producer-baseball-mlb-worker
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  clusterIP: None
