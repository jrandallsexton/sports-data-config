apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: producer-metrics
  namespace: default
  labels:
    app: producer-football-ncaa
    release: kube-prometheus-stack
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - producer-football-ncaa-api
          - producer-football-ncaa-ingest
          - producer-football-ncaa-worker
          - producer-football-nfl-api
          - producer-football-nfl-ingest
          - producer-football-nfl-worker
          - producer-baseball-mlb-api
          - producer-baseball-mlb-ingest
          - producer-baseball-mlb-worker
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
