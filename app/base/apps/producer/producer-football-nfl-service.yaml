apiVersion: v1
kind: Service
metadata:
  name: producer-svc-football-nfl
  namespace: default
  labels:
    app: producer-football-nfl-api
spec:
  selector:
    app: producer-football-nfl-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
# Headless Service for Worker pods — enables Prometheus ServiceMonitor discovery
apiVersion: v1
kind: Service
metadata:
  name: producer-football-nfl-worker-metrics
  namespace: default
  labels:
    app: producer-football-nfl-worker
spec:
  selector:
    app: producer-football-nfl-worker
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
  clusterIP: None
