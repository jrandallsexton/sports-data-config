apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer-football-ncaa
  namespace: default
  annotations:
    # TEMP: Disabled during load test to prevent cycling
    # configmap.reloader.stakater.com/reload: "reload-trigger"
spec:
  replicas: 2  # SCALED TO ZERO for database snapshot
  selector:
    matchLabels:
      app: producer-football-ncaa
  template:
    metadata:
      labels:
        app: producer-football-ncaa
        sport: football-ncaa
    spec:
      terminationGracePeriodSeconds: 120
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: producer
        image: sportdeets.azurecr.io/sportsdataproducer:1343
        imagePullPolicy: IfNotPresent
        command: ["dotnet"]
        args: ["SportsData.Producer.dll", "-mode", "FootballNcaa"]
        env:
          - name: APPCONFIG_CONNSTR
            valueFrom:
              secretKeyRef:
                name: azure-app-config
                key: connectionstring
          - name: APPCONFIG_LABEL
            value: "Prod"
          - name: AZURE_TENANT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_TENANT_ID
          - name: AZURE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_ID
          - name: AZURE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_SECRET
        envFrom:
          - configMapRef:
              name: app-config
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          limits:
            memory: 2Gi
            cpu: "2"
          requests:
            memory: 1Gi
            cpu: "1"

