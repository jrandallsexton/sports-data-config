apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-dashboard
  namespace: default
  annotations:
    configmap.reloader.stakater.com/reload: "reload-trigger"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobs-dashboard
  template:
    metadata:
      labels:
        app: jobs-dashboard
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: jobs-dashboard
        image: sportdeets.azurecr.io/sportsdatajobsdashboard:latest
        imagePullPolicy: Always
        command: ["dotnet"]
        args: ["SportsData.JobsDashboard.dll"]
        env:
          - name: APPCONFIG_LABEL
            value: "Prod"
          - name: APPCONFIG_CONNSTR
            valueFrom:
              secretKeyRef:
                name: azure-app-config
                key: connectionstring
          - name: AZURE_TENANT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_TENANT_ID
          - name: AZURE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_ID
          - name: AZURE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_SECRET
        envFrom:
          - configMapRef:
              name: app-config
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 256Mi
            cpu: "500m"
