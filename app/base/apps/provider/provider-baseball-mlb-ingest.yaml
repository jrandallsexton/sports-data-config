# Provider Ingest — consumes MassTransit messages, enqueues Hangfire jobs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-baseball-mlb-ingest
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-baseball-mlb-ingest
  template:
    metadata:
      labels:
        app: provider-baseball-mlb-ingest
        provider-role: ingest
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: provider-baseball-mlb-ingest
        image: sportdeets.azurecr.io/sportsdataprovider:3670
        imagePullPolicy: IfNotPresent
        command: ["dotnet"]
        args: ["SportsData.Provider.dll", "-mode", "BaseballMlb", "-role", "Ingest"]
        env:
          - name: APPCONFIG_CONNSTR
            valueFrom:
              secretKeyRef:
                name: azure-app-config-mlb
                key: connectionstring
          - name: AZURE_TENANT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_TENANT_ID
          - name: AZURE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_ID
          - name: AZURE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_SECRET
        envFrom:
          - configMapRef:
              name: app-config
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          limits:
            memory: 1Gi
            cpu: "1"
          requests:
            memory: 512Mi
            cpu: "0.25"
