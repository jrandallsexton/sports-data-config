# Provider Worker — processes Hangfire jobs (ESPN fetches, document processing)
# Replicas managed by KEDA ScaledObject — do not set here
# Pause toggle (autoscaling.keda.sh/paused) lives on the ScaledObject in
# scaledobject-baseball-mlb.yaml — KEDA only reads it from there.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-baseball-mlb-worker
  namespace: default
spec:
  # replicas managed by KEDA ScaledObject — do not set here
  selector:
    matchLabels:
      app: provider-baseball-mlb-worker
  template:
    metadata:
      labels:
        app: provider-baseball-mlb-worker
        provider-role: worker
    spec:
      terminationGracePeriodSeconds: 120
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: provider-baseball-mlb-worker
        image: sportdeets.azurecr.io/sportsdataprovider:3670
        imagePullPolicy: IfNotPresent
        command: ["dotnet"]
        args: ["SportsData.Provider.dll", "-mode", "BaseballMlb", "-role", "Worker"]
        env:
          - name: APPCONFIG_CONNSTR
            valueFrom:
              secretKeyRef:
                name: azure-app-config-mlb
                key: connectionstring
          - name: AZURE_TENANT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_TENANT_ID
          - name: AZURE_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_ID
          - name: AZURE_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: azure-identity
                key: AZURE_CLIENT_SECRET
        envFrom:
          - configMapRef:
              name: app-config
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /api/health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          limits:
            memory: 2Gi
            cpu: "2"
          requests:
            memory: 1Gi
            cpu: "1"
