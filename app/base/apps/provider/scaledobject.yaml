apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: provider-football-ncaa-scaler
  namespace: default
  annotations:
    autoscaling.keda.sh/paused: "true"
spec:
  scaleTargetRef:
    name: provider-football-ncaa
  pollingInterval: 15    # Check every 15 seconds
  cooldownPeriod: 300    # Wait 5 min before scaling down
  minReplicaCount: 2     # Backlog of ~1.7M jobs; no reason to scale below max
  maxReplicaCount: 5     # For live season tracking, increase to 4-6
  fallback:
    failureThreshold: 3  # After 3 consecutive trigger query failures, hold replicas
    replicas: 4
  triggers:
    - type: postgresql
      metadata:
        # Query Hangfire database for pending jobs
        query: >-
          SELECT COUNT(*)::int
          FROM hangfire.jobqueue
          WHERE fetchedat IS NULL
            AND queue = 'default'
        targetQueryValue: "30"                # Scale up if >30 jobs per pod
        activationTargetQueryValue: "1"       # Scale from minReplicas if any jobs
      authenticationRef:
        name: provider-hangfire-trigger-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: provider-hangfire-trigger-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: host
      name: provider-hangfire-pg-params
      key: host
    - parameter: port
      name: provider-hangfire-pg-params
      key: port
    - parameter: userName
      name: provider-hangfire-pg-params
      key: username
    - parameter: password
      name: provider-hangfire-pg-params
      key: password
    - parameter: dbName
      name: provider-hangfire-pg-params
      key: database
    - parameter: sslmode
      name: provider-hangfire-pg-params
      key: sslmode
