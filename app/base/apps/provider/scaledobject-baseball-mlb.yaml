apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: provider-baseball-mlb-worker-scaler
  namespace: default
  annotations:
    # Paused 2026-04-24: abandoning full historical MLB sourcing; focusing on
    # current-season in-season testing only. Remove both annotations to
    # resume KEDA scaling (minReplicaCount=2, maxReplicaCount=5). Setting
    # replicas=0 on the Deployment alone won't stick — KEDA continuously
    # reconciles the target.
    #
    # `paused: "true"` halts the scaler reconcile loop; `paused-replicas: "0"`
    # additionally pins the target count at 0 so no pods remain running.
    autoscaling.keda.sh/paused: "false"
    autoscaling.keda.sh/paused-replicas: "0"
spec:
  scaleTargetRef:
    name: provider-baseball-mlb-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 5
  fallback:
    failureThreshold: 3
    replicas: 2
  triggers:
    - type: postgresql
      metadata:
        query: >-
          SELECT COUNT(*)::int
          FROM hangfire.jobqueue
          WHERE fetchedat IS NULL
            AND queue = 'default'
        targetQueryValue: "30"
        activationTargetQueryValue: "1"
      authenticationRef:
        name: provider-mlb-hangfire-trigger-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: provider-mlb-hangfire-trigger-auth
  namespace: default
spec:
  secretTargetRef:
    - parameter: host
      name: provider-mlb-hangfire-pg-params
      key: host
    - parameter: port
      name: provider-mlb-hangfire-pg-params
      key: port
    - parameter: userName
      name: provider-mlb-hangfire-pg-params
      key: username
    - parameter: password
      name: provider-mlb-hangfire-pg-params
      key: password
    - parameter: dbName
      name: provider-mlb-hangfire-pg-params
      key: database
    - parameter: sslmode
      name: provider-mlb-hangfire-pg-params
      key: sslmode
