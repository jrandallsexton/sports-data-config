      terminationGracePeriodSeconds: 30
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: provider-football-ncaa-api
        image: sportdeets.azurecr.io/sportsdataprovider:1348
        imagePullPolicy: IfNotPresent
        command: ["dotnet"]
        args: ["SportsData.Provider.dll", "-mode", "FootballNcaa", "-role", "Api"]
        env:
          - name: APPCONFIG_CONNSTR
            valueFrom:
