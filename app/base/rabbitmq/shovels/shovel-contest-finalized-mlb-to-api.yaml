apiVersion: rabbitmq.com/v1beta1
kind: Shovel
metadata:
  name: shovel-contest-finalized-mlb-to-api
  namespace: messaging
spec:
  name: shovel-contest-finalized-mlb-to-api
  uriSecret:
    name: shovel-baseball-mlb-to-api-credentials
  # ContestFinalized lives under the sport-neutral Contests namespace,
  # not Contests.Baseball — the same exchange name is reused on every
  # sport broker, only the broker pair changes.
  srcExchange: "SportsData.Core.Eventing.Events.Contests:ContestFinalized"
  srcExchangeKey: ""
  destExchange: "SportsData.Core.Eventing.Events.Contests:ContestFinalized"
  ackMode: "on-confirm"
  srcPrefetchCount: 1000
  rabbitmqClusterReference:
    name: rabbitmq-api
    namespace: messaging
