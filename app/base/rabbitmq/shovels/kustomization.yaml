apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# RabbitMQ shovel definitions for cross-broker integration event delivery.
#
# Each Shovel CRD requires a credentials Secret (one per source-broker:
# `shovel-baseball-mlb-to-api-credentials`,
# `shovel-football-ncaa-to-api-credentials`,
# `shovel-football-nfl-to-api-credentials`) to exist in the messaging
# namespace BEFORE the Shovel reconciles successfully. Each Secret is
# created out-of-band via kubectl from the cluster-operator-managed
# default-user secrets — see README.md in this directory.
#
# Why out-of-band: the credentials live in
# `rabbitmq-{cluster}-default-user` secrets that the cluster operator
# creates and owns. They rotate if the cluster is rebuilt, so we don't
# commit the values to git. The Shovel CRDs reference the credentials
# secret by name; MTO retries until the secret is present.
#
# See docs/broker-detangle-plan.md in the sports-data repo for the
# Round 1 (MLB+API) + Round 2 (football) migration context — each
# sport-league + API gets its own dedicated broker; shovels bridge
# integration events from each Producer broker to the API broker.

resources:
  - shovel-baseball-play-completed-mlb-to-api.yaml
  - shovel-contest-status-changed-mlb-to-api.yaml
  - shovel-football-play-completed-ncaa-to-api.yaml
  - shovel-contest-status-changed-ncaa-to-api.yaml
  - shovel-football-play-completed-nfl-to-api.yaml
  - shovel-contest-status-changed-nfl-to-api.yaml
