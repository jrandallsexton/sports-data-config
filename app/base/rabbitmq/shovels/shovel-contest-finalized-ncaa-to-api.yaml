apiVersion: rabbitmq.com/v1beta1
kind: Shovel
metadata:
  name: shovel-contest-finalized-ncaa-to-api
  namespace: messaging
spec:
  name: shovel-contest-finalized-ncaa-to-api
  uriSecret:
    name: shovel-football-ncaa-to-api-credentials
  srcExchange: "SportsData.Core.Eventing.Events.Contests:ContestFinalized"
  srcExchangeKey: ""
  destExchange: "SportsData.Core.Eventing.Events.Contests:ContestFinalized"
  ackMode: "on-confirm"
  srcPrefetchCount: 1000
  rabbitmqClusterReference:
    name: rabbitmq-api
    namespace: messaging
