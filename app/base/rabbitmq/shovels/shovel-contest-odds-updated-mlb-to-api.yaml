apiVersion: rabbitmq.com/v1beta1
kind: Shovel
metadata:
  name: shovel-contest-odds-updated-mlb-to-api
  namespace: messaging
spec:
  name: shovel-contest-odds-updated-mlb-to-api
  uriSecret:
    name: shovel-baseball-mlb-to-api-credentials
  # ContestOddsUpdated lives under the sport-neutral Contests namespace —
  # same exchange name on every Producer broker, only the broker pair
  # changes per league.
  srcExchange: "SportsData.Core.Eventing.Events.Contests:ContestOddsUpdated"
  srcExchangeKey: ""
  destExchange: "SportsData.Core.Eventing.Events.Contests:ContestOddsUpdated"
  ackMode: "on-confirm"
  srcPrefetchCount: 1000
  rabbitmqClusterReference:
    name: rabbitmq-api
    namespace: messaging
