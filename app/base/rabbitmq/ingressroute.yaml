---
# API RabbitMQ Management UI — messaging-api.sportdeets.com (new in Round 1)
# Points at the new dedicated API broker `rabbitmq-api`. Added in Phase 2 of
# the broker-detangle migration; persists post-migration as the canonical
# API broker UI.
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq-api-http
  namespace: messaging
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`messaging-api.sportdeets.com`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: traefik
      services:
        - name: rabbitmq-api
          port: 15672
---
apiVersion: traefik.containo.us/v1alpha1
