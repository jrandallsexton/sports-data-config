---
# NCAA RabbitMQ Management UI — messaging-footballncaa.sportdeets.com
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq-ncaa-http
  namespace: messaging
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`messaging-footballncaa.sportdeets.com`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: traefik
      services:
        - name: rabbitmq
          port: 15672
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: rabbitmq-ncaa-https
  namespace: messaging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`messaging-footballncaa.sportdeets.com`)
      kind: Rule
      services:
        - name: rabbitmq
          port: 15672
  tls:
    secretName: messaging-footballncaa-sportdeets-tls
